# 这里的参数会被代码以 .Site.Params 的形式读取
params:
  showAuthor: false
  ShowBreadCrumbs: false
  ShowLastMod: false
  showAuthor: false
 


  color: light
  homeInfoParams:
    
    Title:  让世界是世界<br>我甘心是我的茧
    #content: "It is the time you have wasted for your rose that makes your rose so important."
    content: "🍂无挂碍故，无有恐怖，远离颠倒梦想，究竟涅槃。<br/>It is the time you have wasted for your rose that makes your rose so important.</b><br/>旧博客地址请访问[进击的小白👉](https://ioser.io)"


  
  favicon: "img/favicon.ico"
  favicon16x16: "img/favicon.ico"
  favicon32x32: "img/favicon.ico"
  apple_touch_icon: "img/favicon.ico"
  safari_pinned_tab: "img/favicon.ico"

  defaultTheme: light  # defaultTheme: light or  dark
  disableThemeToggle: false
  DateFormat: "2006-01-02"
  ShowShareButtons: false
  ShowReadingTime: false
  # disableSpecialistPost: true
  displayFullLangName: false
  ShowPostNavLinks: true

  ShowCodeCopyButtons: true
  hideFooter: true # 隐藏页脚
  ShowWordCounts: false
  VisitCount: false
  ShowLastMod: false #显示文章更新时间
  
  disableHLJS: true                        # disable highlight.js
  disablePostNavigation: false              # disable post navigation
  monoDarkIcon: true                       # show monochrome dark mode icon
          # e.g. 'https://cdn.v2ex.com/gravatar/'
  math: true                               # enable KaTeX math typesetting globally
  localKatex: true                        # use local KaTeX js/css instead of CDN


  ShowToc: true # 显示目录

  comments: true


  label: # 左上角图标
    text: "ElikeZ"
    icon: "img/fish.gif"
    iconHeight: 35



  assets:
    favicon: "img/favicon.ico"
    favicon16x16: "img/favicon.ico"
    favicon32x32: "img/favicon.ico"
    apple_touch_icon: "img/favicon.ico"
    safari_pinned_tab: "img/favicon.ico"
    lightgallery: true

  cover:
    hidden: false # hide everywhere but not in structured data
    hiddenInList: false # hide on list pages and home
    hiddenInSingle: false # hide on single page
    
 

  fuseOpts: # 搜索配置
    isCaseSensitive: false
    shouldSort: false
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: [ "title", "permalink", "summary" ]

  searchHidden: true

  StartYear: 2015 # 底部开始年份

  disableScrollToTop: false



  # twikoo评论
  twikoo:
    version: 1.6.39 # 填写twikoo版本号
    id: 'https://main--elikez.netlify.app/.netlify/functions/twikoo'# 填写自己的twikoo id
    region:  # 环境地域，默认为 ap-shanghai，如果您的环境地域不是上海，需传此参数，请看twikoo官方文档


markup:
  goldmark:
    renderer:
      unsafe: true # HUGO 默认转义 Markdown 文件中的 HTML 代码，如需开启的话
  highlight:
    # anchorLineNos: true
    codeFences: true
    guessSyntax: true
    # lineNos: true
    noClasses: true
    tabWidth: 4
    style: monokai
    # codeFences：代码围栏功能，这个功能一般都要设为 true 的，不然很难看，就是干巴巴的-代码文字，没有颜色。
    # guessSyntax：猜测语法，这个功能建议设置为 true, 如果你没有设置要显示的语言则会自动匹配。
    # hl_Lines：高亮的行号，一般这个不设置，因为每个代码块我们可能希望让高亮的地方不一样。
    # lineNoStart：行号从编号几开始，一般从 1 开始。
    # lineNos：是否显示行号，我比较喜欢显示，所以我设置的为 true.
    # lineNumbersInTable：使用表来格式化行号和代码,而不是 标签。这个属性一般设置为 true.
    # noClasses：使用 class 标签，而不是内嵌的内联样式

