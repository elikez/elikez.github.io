<!-- Twikoo -->
<div>
    <div class="pagination__title">
        <span class="pagination__title-h" style="font-size: 18px;"><b>💬评论</b></span>
        <hr />
    </div>

    <div id="tcomment"></div>

   <script src="https://cdn.jsdelivr.net/npm/twikoo@1.6.39/dist/twikoo.all.min.js"></script>
 

    <!-- <script>window.TWIKOO_MAGIC_PATH="共用评论区的名称"</script> -->

    <script>
        twikoo.init({
            envId: {{ .Site.Params.twikoo.id }}, //填自己的
            el: "#tcomment",
            lang: 'zh-CN',
            region: {{ .Site.Params.twikoo.region }},
            path: window.TWIKOO_MAGIC_PATH||window.location.pathname,
    
        });
    </script>

</div>
