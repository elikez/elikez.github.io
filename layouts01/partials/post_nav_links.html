{{- $pages := where site.RegularPages "Type" "in" site.Params.mainSections }}
{{- if and (gt (len $pages) 1) (in $pages . ) }}
<nav class="paginav">
  {{- with $pages.Next . }}
  <a class="prev" href="{{ .Permalink }}">
    <span class="title"><b>« {{ i18n "prev_page" }}</b></span>
    <br>
    <span><b>{{- .Name -}}</b></span>
  </a>
  {{- end }}
  {{- with $pages.Prev . }}
  <a class="next" href="{{ .Permalink }}">
    <span class="title"><b>{{ i18n "next_page" }} »</b></span>
    <br>
    <span><b>{{- .Name -}}</b></span>
  </a>
  {{- end }}
</nav>
{{- end }}
