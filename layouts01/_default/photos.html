{{ define "main" }}
<div class="post">
  <h2 class="post-title" align="center">{{.Title}}</h2>
</div>

<div class="page-photos">
  {{ range (readDir "./static/photos") }}
  <figure>
<!--
    <img src="img/photos/{{ .Name }}" alt="{{ .Name }}" />
-->
    <img src="{{"photos/" | absURL }}{{ .Name }}" alt="{{ .Name }}" />

    <figcaption align="center">{{ .Name | replaceRE "(.*)[.].*" "$1"}}</figcaption>
  </figure>
  {{ end }}
</div>
{{ end }}
